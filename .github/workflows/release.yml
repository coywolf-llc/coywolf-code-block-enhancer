name: Release on PR merge

# After a PR merges to main:
# 1. If the PR did not change the plugin version itself, bump the patch
#    version (header + CBE_VERSION define + readme Stable tag) and prepend a
#    changelog entry crediting the PR; push that bump back to main.
# 2. Build a plugin zip and publish it as a GitHub Release tagged "vX.Y.Z".

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to bump or release at the current version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Read the version currently committed on main. That is the source
          # of truth for "what version are we trying to ship?".
          CURR=$(grep -oE "define\(\s*'CBE_VERSION',\s*'[^']+'" \
            code-block-enhancer.php \
            | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"

          # If a release for the current version already exists, the PR
          # didn't include its own version bump — auto-bump the patch.
          # Otherwise the PR set the version explicitly; release at it.
          if gh release view "v$CURR" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v$CURR already exists; will auto-bump the patch."
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v$CURR yet; releasing at the current version."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            echo "release_version=$CURR" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next patch version
        if: steps.check.outputs.needs_bump == 'true'
        id: ver
        env:
          CURR: ${{ steps.check.outputs.curr }}
        run: |
          set -euo pipefail
          IFS='.' read -r MAJ MIN PAT <<< "$CURR"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURR -> $NEW"

      - name: Apply bump to files
        if: steps.check.outputs.needs_bump == 'true'
        env:
          CURR: ${{ steps.check.outputs.curr }}
          NEW:  ${{ steps.ver.outputs.new }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          sed -i -E "s|(Version:[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" code-block-enhancer.php
          sed -i -E "s|(define\(\s*'CBE_VERSION',\s*')${CURR//./\\.}(')|\1${NEW}\2|" code-block-enhancer.php
          sed -i -E "s|(Stable tag:[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" readme.txt
          # readme.md mirror: bump the **Version:** bullet too (if present).
          if [ -f readme.md ]; then
            sed -i -E "s|(\*\*Version:\*\*[[:space:]]+)${CURR//./\\.}\b|\1${NEW}|" readme.md
          fi

          python3 - <<'PY'
          import os, re
          new = os.environ["NEW"]
          title = os.environ["PR_TITLE"].replace("\r", " ").strip() or "Maintenance update"
          num = os.environ["PR_NUMBER"]

          targets = [
              {
                  "path": "readme.txt",
                  "anchor": r"(== Changelog ==\n)",
                  "entry":  f"\n= {new} =\n* {title} (#{num}).\n",
                  "required": True,
              },
              {
                  "path": "readme.md",
                  "anchor": r"(## Changelog\n)",
                  "entry":  f"\n### {new}\n- {title} (#{num}).\n",
                  "required": False,
              },
          ]
          for t in targets:
              if not os.path.exists(t["path"]):
                  if t["required"]:
                      raise SystemExit(f"Missing required file: {t['path']}")
                  continue
              with open(t["path"], "r", encoding="utf-8") as f:
                  content = f.read()
              new_content, n = re.subn(t["anchor"], r"\1" + t["entry"], content, count=1)
              if n == 0:
                  raise SystemExit(f"Could not find changelog anchor in {t['path']}")
              with open(t["path"], "w", encoding="utf-8") as f:
                  f.write(new_content)
          PY

      - name: Commit and push bump
        if: steps.check.outputs.needs_bump == 'true'
        id: commit
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code-block-enhancer.php readme.txt
          [ -f readme.md ] && git add readme.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(release): bump version to ${NEW} [skip ci]"
            git push origin main
          fi
          echo "release_version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Resolve final release version
        id: final
        run: |
          set -euo pipefail
          if [ "${{ steps.check.outputs.needs_bump }}" = "true" ]; then
            V="${{ steps.commit.outputs.release_version }}"
          else
            V="${{ steps.check.outputs.release_version }}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tagcheck
        env:
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          SLUG: code-block-enhancer
        run: |
          set -euo pipefail
          BUILD_DIR="$RUNNER_TEMP/build"
          STAGE="$BUILD_DIR/$SLUG"
          rm -rf "$BUILD_DIR"
          mkdir -p "$STAGE"

          # Copy plugin files, excluding repo / CI artefacts.
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.wordpress-org' \
            --exclude 'build' \
            --exclude '*.zip' \
            --exclude 'tests' \
            --exclude 'node_modules' \
            ./ "$STAGE/"

          ( cd "$BUILD_DIR" && zip -r -q "$GITHUB_WORKSPACE/$SLUG.zip" "$SLUG" )
          ls -l "$SLUG.zip"

      - name: Extract release notes from readme.txt
        if: steps.tagcheck.outputs.exists == 'false'
        id: notes
        env:
          VERSION: ${{ steps.final.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > release-notes.md
          import os, re
          version = os.environ["VERSION"]
          with open("readme.txt", "r", encoding="utf-8") as f:
              content = f.read()
          # Capture the body of "= <VERSION> =" up to the next "= x.y.z =" or end.
          pattern = r"=\s*" + re.escape(version) + r"\s*=\n(.*?)(?=\n=\s*\d|\Z)"
          m = re.search(pattern, content, re.DOTALL)
          if m:
              body = m.group(1).strip()
          else:
              body = "Release " + version + "."
          print(body)
          PY
          echo "---"
          cat release-notes.md

      - name: Create GitHub release
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.final.outputs.tag }}
          VERSION:  ${{ steps.final.outputs.version }}
          SLUG:     code-block-enhancer
        run: |
          set -euo pipefail
          # Target the latest commit on main (the bump commit, if we just made one).
          TARGET=$(git rev-parse HEAD)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --target "$TARGET" \
            "${SLUG}.zip"

      # ----------------------------------------------------------------------
      # WordPress.org variant (.github/build-wporg.sh): strips the GitHub
      # self-updater the .org directory forbids, derives the .org zip from the
      # same stage as the GitHub zip, always uploads it as an artifact (for the
      # initial .org submission / Plugin Check), and deploys to .org SVN once
      # the WPORG_SVN_* secrets exist (skips cleanly until then).
      # ----------------------------------------------------------------------
      - name: Build WordPress.org variant
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          SLUG: code-block-enhancer
        run: |
          set -euo pipefail
          bash .github/build-wporg.sh "$RUNNER_TEMP/build/$SLUG" "$RUNNER_TEMP/wporg"
          ( cd "$RUNNER_TEMP/wporg" && zip -r -q "$GITHUB_WORKSPACE/$SLUG-wporg.zip" "$SLUG" )
          ls -l "$SLUG-wporg.zip"

      - name: Upload WordPress.org zip (submission / Plugin Check)
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.final.outputs.tag }}-wporg
          path: code-block-enhancer-wporg.zip
          if-no-files-found: error

      - name: Check for WordPress.org SVN credentials
        if: steps.tagcheck.outputs.exists == 'false'
        id: wporg
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
        run: |
          if [ -n "${SVN_USERNAME:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "No WPORG_SVN_USERNAME secret set — built the .org zip artifact; skipping SVN deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to WordPress.org SVN
        if: steps.tagcheck.outputs.exists == 'false' && steps.wporg.outputs.ready == 'true'
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG:         code-block-enhancer
          VERSION:      ${{ steps.final.outputs.version }}
          BUILD_DIR:    ${{ runner.temp }}/wporg/code-block-enhancer
          ASSETS_DIR:   .wordpress-org
